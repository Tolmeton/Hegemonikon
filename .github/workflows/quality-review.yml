# Automated Quality Review for Hegemonikón
#
# Perplexity研究「自動品質レビュー機構」に基づく
# ISO 25010 + 3M品質管理の自動チェック
#
# スケジュール: 毎週月曜 09:00 JST (Jules と同時刻)

name: Quality Review

on:
  schedule:
    - cron: "0 0 * * 1"  # 毎週月曜 00:00 UTC
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  code-quality:
    name: "🔍 Code Quality (ISO 25010)"
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: Install tools
        run: |
          pip install ruff bandit vulture pip-audit
      
      # Stage 1: 保守性 (Maintainability)
      - name: "📊 Complexity Check (CC ≤ 15)"
        run: |
          echo "## Complexity Analysis" >> $GITHUB_STEP_SUMMARY
          ruff check . --select C901 --output-format=text || true
      
      # Stage 2: セキュリティ (Security)
      - name: "🔒 Security Scan (Bandit)"
        run: |
          echo "## Security Scan" >> $GITHUB_STEP_SUMMARY
          bandit -r mekhane/ -f txt -ll || true
      
      # Stage 3: ムダ検出 (Dead Code)
      - name: "🧹 Dead Code (Vulture)"
        run: |
          echo "## Dead Code Analysis" >> $GITHUB_STEP_SUMMARY
          vulture mekhane/ --min-confidence 90 || true
      
      # Stage 4: 脆弱性 (Vulnerabilities)
      - name: "⚠️ Dependency Audit"
        run: |
          echo "## Dependency Vulnerabilities" >> $GITHUB_STEP_SUMMARY
          pip-audit --progress-spinner=off || true
      
      - name: Summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**Framework**: ISO/IEC 25010 + 3M (ムリ/ムダ/ムラ)" >> $GITHUB_STEP_SUMMARY
          echo "*Generated by Hegemonikón Quality Review*" >> $GITHUB_STEP_SUMMARY
