<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hegemonikón Desktop</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='50,5 93,27.5 93,72.5 50,95 7,72.5 7,27.5' fill='none' stroke='%23d4a574' stroke-width='6'/%3E%3Ctext x='50' y='62' text-anchor='middle' font-size='36' fill='%23d4a574'%3EH%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#d4a574" />
</head>

<body>
  <div id="app">
    <!-- U1: Left Icon Rail (48px) -->
    <aside id="icon-rail">
      <!-- Dynamically generated by main.ts -->
    </aside>

    <!-- U2: Vertical Tab Nav (180px) with toggle -->
    <nav id="tab-nav">
      <div class="nav-header">
        <h2 class="nav-brand">⬡ Hegemonikón</h2>
        <button id="tab-nav-toggle" class="nav-toggle-btn" title="アシスタントペイン">◧</button>
      </div>
      <!-- Dynamically generated by main.ts -->
    </nav>

    <!-- Main Content -->
    <main id="view-content">
      <div class="loading">Loading...</div>
    </main>

    <!-- U3: Slide-out Panel (右ドロワー) — ターミナル + アーティファクト -->
    <div id="slide-trigger" class="slide-trigger" title="パネルを開く">
      <div class="slide-trigger-line"></div>
    </div>
    <aside id="slide-panel" class="slide-panel">
      <div class="slide-panel-header">
        <div class="slide-panel-tabs">
          <button class="sp-tab active" data-sp-tab="terminal">⬢ Terminal</button>
          <button class="sp-tab" data-sp-tab="artifacts">◇ Artifacts</button>
        </div>
        <button id="slide-panel-close" class="slide-panel-close" title="閉じる">✕</button>
      </div>
      <!-- Terminal pane -->
      <div id="sp-terminal" class="sp-pane sp-pane-active">
        <pre id="sp-terminal-output" class="sp-terminal-output">$ ready\n</pre>
      </div>
      <!-- Artifacts pane -->
      <div id="sp-artifacts" class="sp-pane">
        <div id="sp-artifact-list" class="sp-artifact-list">
          <div class="sp-empty">アーティファクトなし</div>
        </div>
      </div>
    </aside>
  </div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => { });
      });
    }
  </script>
</body>

</html>
