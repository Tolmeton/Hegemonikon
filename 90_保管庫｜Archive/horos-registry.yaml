    full_text: |-
      ### BC-5b: 書き込み前読み込み義務（Read Before Write — V-xxx 2026-02-28）

      > **起源**: 2026-02-28 `.env` 破壊事件 — 一元化済み `.env` (48行、26+キー) を `cat > .env` で2行に上書き。
      > git 管理外のため復元不能。`fd` と `grep_search` が hidden/.gitignore ファイルを除外 → 「存在しない」と誤判断。

      **原則**: ファイルに書き込む前に、そのファイルの中身を読め。

      **義務**: 以下のいずれかに該当するファイルへの書き込み前に、**必ず `view_file` で現在の内容を確認**すること:

      | 条件 | 理由 |
      |:-----|:-----|
      | `.env*` ファイル | .gitignore 対象 = git 復元不能 |
      | `.gitignore` に含まれるファイル | 同上 |
      | 設定ファイル (yaml, toml, json) | 既存設定を破壊するリスク |
      | `>` リダイレクトで書き込むとき | 上書き = 既存内容の消滅 |

      **禁止**: `cat > file` / `echo > file` で既存ファイルを上書きすること。追記は `>>` を使え。新規作成は `write_to_file` (Overwrite=false) を使え。

      **検索ツールの限界**:

      | ツール | hidden files | .gitignore 対象 | 注意 |
      |:-------|:----------:|:---------------:|:-----|
      | `fd` (find_by_name) | ❌ 除外 | ❌ 除外 | `.env` が見えない |
      | `grep_search` (rg) | ❌ 除外 | ❌ 除外 | `.env` が見えない |
      | `view_file` | ✅ 読める | ✅ 読める | **これを使え** |
      | `list_dir` | ✅ 見える | ✅ 見える | **これで存在確認** |

      **自己検証**: 「ファイルに書き込もうとしている。そのファイルの現在の中身を view_file で読んだか？」
    self_check: 書き込む前に view_file で現在の内容を読んだか？
  BC-6:
    name: 確信度明示義務
    en_name: Confidence Labels + TAINT 追跡
    category: always_on
