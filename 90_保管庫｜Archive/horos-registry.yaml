  BC-11:
    name: CCL 実行義務
    en_name: CCL Execution Enforcement
    category: context_triggered
    min_depth: L1
    triggers:
    - ccl_detected
    - workflow_execution
    full_text: |-
      ### BC-11: CCL 実行義務（CCL Execution Enforcement — v3.7 アトミック実行版）

      > **傾向**: CCL 式を「自然言語の指示」として解釈し、dispatch/execute を呼ばず手書きする。
      > 🚨 **深刻な傾向 (2026-02-27)**: `dispatch` だけを呼んで「実行したつもり」になり、`execute` を呼ばずに手書きする事案が多発 (BRD-B11 の変種)。
      > **教訓**: 「次にexecuteを呼ぼう」という意志的記憶は揮発する。アトミックな環境のツールで塞ぐ。

      **CCL 式の検出パターン**: 以下のいずれかにマッチする入力は CCL 式である:

      | パターン | 例 | 処理 |
      |:---------|:---|:-----|
      | `/` で始まる | `/ccl-plan-`, `/noe+`, `/dia` | MCP: `hermeneus_run` または `hgk_ccl_run` を実行 |
      | `@` で始まる | `@plan`, `@next`, `@chew` | MCP: `hermeneus_run` または `hgk_ccl_run` を実行 |
      | CCL 演算子を含む | `~`, `*`, `>>`, `_` | MCP: `hermeneus_run` または `hgk_ccl_run` を実行 |

      **必須手順**: CCL 式を検出したら、以下を**必ず**実行:

      1. **`hermeneus_run`** (またはモバイル版 `hgk_ccl_run`) ツールを呼び出す。
         - このツールが内部で `dispatch` (ASTパース) と `execute` (LLM実行) を**アトミックに連続実行**して返す。
         - 単独の `dispatch` ツールは**構造分析用 (デバッグ・参照)** に格下げされた。実行を伴う場合は絶対に `hermeneus_run` を使うこと。

      **絶対禁止 (BRD-B11)**:

      - CCL 式を見て自分のテキスト出力で「実行結果」を手書きすること。これは**偽装**である。
      - `hermeneus_dispatch` だけを呼んでタスクを終わらせ、残りの処理をテキストで捏造すること。実行が要求されているなら `hermeneus_run` を一発で叩け。

      **`-` 派生の扱い (BRD-B12)**: `-` は「省略してよい」ではなく「密度を上げて短くする」。`hermeneus_run` (execute側) が適切に処理する。手書きで「薄い出力」を捏造してはならない。

      **Single WF Compile-Only Mode (v4.2 — 2026-02-28)**:

      > **設計意図**: 単一 WF は Claude が会話コンテキストを活かして直接実行する方が品質が高い。Gemini 経由のラウンドトリップも不要。

      `hermeneus_run` は AST の `workflows` リストが 1 つの場合、LLM 実行をスキップして **compile-only レスポンス** を返す。

      | 条件 | hermeneus_run の動作 | Claude の行動 |
      |:-----|:-------------------|:-------------|
      | WF == 1 (`/noe+`, `/dia-` 等) | AST + WF パスを返す (LLM 実行なし) | `view_file` で WF 定義を読み、手動で実行 |
      | WF >= 2 (マクロ, シーケンス) | 従来通りフル自動実行 | 出力を批評して報告 (BC-11b) |
      | `use_llm=False` | 常にフル実行 (simulation) | — |

      **手動実行時の BC-3 連動**: `view_file` で WF 定義を開き、出力形式に従う義務は変わらない。

      **例外なし** (手書き偽装の禁止は compile-only モードでも適用。`hermeneus_run` の呼び出し自体は必須)。

      > **設計判断 (§1.1 plan 専用ターン)**: `hermeneus_run` は内部で dispatch (AST 解析 = plan) → execute (LLM 実行 = act) を順次実行する。
      > Orchestrator レベルでのターン分離は IDE 制約で不可能だが、`hermeneus_run` 自体がアトミックに plan→act を内包しており、実質的に同等の効果を達成している。
      > (SOURCE: パプくん §1.1 — plan 専用 turn の分離提言)
      >
      > **設計判断 (§2.1 ツールチェーン原子化)**: パプくんの「ツールの小型化・単機能化」提言に対し、`hermeneus_run` は逆方向（統合）を選択した。
      > これは「dispatch と execute の間でスキップが発生する」という特定の失敗モードに対し、「選択肢を除去する」環境強制が「単機能分割＋順序遵守」より効果的であるという判断による。
      > (SOURCE: パプくん §2.1 + Claude B6 — 意志的改善策の全失敗実績)

      **実行後批評義務 (BC-11b -- v4.1 追加)**:

      > **傾向**: hermeneus_run を呼んだ後、その出力を無批判に要約して Creator に転送する。
      > **起源**: V-xxx (2026-02-28) -- /kop+ 実行結果を劣化伝達。403 エラーを調査せず「quota の可能性」と推測で流した。
      > **Creator の言葉**: 「hermeneus_run の出力は"材料"であって"カンペ"ではない」

      hermeneus_run (または hermeneus_execute) の出力を受け取った後、以下を **必ず** 実行してから Creator に報告すること:

      | # | 義務 | 具体的行動 |
      |:--|:-----|:----------|
      | 1 | **エラー調査** | エラーがあれば推測ではなく実際に調査する (API quota, runtime コード, ログ等) |
      | 2 | **独立批評** | Gemini 出力に対する自分の評価・補足・反論を `[主観]` ラベルで明記する (BC-7) |
      | 3 | **SOURCE 分離** | `[SOURCE: hermeneus]` と `[SOURCE: Claude]` で情報源を区別する |
      | 4 | **情報保存** | 要約時に情報量を落とさない。落とす場合は「省略: {何を}」を明記 |

      **禁止 (BRD-B18)**: 出力をテーブルに圧縮してそのまま転送する「劣化伝達」パターン。

      **コンテキスト全量渡し義務 (BC-11c — v4.4 追加)**:

      > **傾向**: hermeneus_run の context パラメータに要約や1行サマリーだけを渡し、
      > コンテキストの大部分を省略する。結果として LLM が貧弱な情報で実行し出力品質が劣化する。
      > **起源**: 2026-03-02 /ske ディスパッチ — 5仮説の全文が5行の要約に圧縮されていた。
      > **Creator の言葉**: 「/rom+ 的な全量コンテキストを渡すようにして」

      hermeneus_run (または hermeneus_execute) の `context` パラメータには、
      `/rom+` 的な「最低限の下処理をした原文」を渡すこと:

      | 含めるべきもの | 例 |
      |:-------------|:---|
      | 先行分析の原文 | /noe+ の仮説全文、根拠、FEP 的解釈 |
      | Creator の発言 | 核心的な言語化の原文引用 |
      | 構造的メタ情報 | 仮説間の因果関係、フィードバックループ |
      | 違反歴・パターン | 関連する BC 違反ログ |
      | 現在のセッション状態 | boot 結果、Quota、直近の作業コンテキスト |

      **禁止 (BRD-B19)**: context を1-5行に要約してから渡す「コンテキスト圧縮」。
      MCP ツールが context 長 < 200文字で⚠️警告を出力する（環境強制）。
    self_check: hermeneus_run を呼んだか？テキストで捏造していないか？
