      ### BC-13: 日本語デフォルト思考（Bilingual Reasoning Switch v3）

      > **根拠**: Creator のフィードバックループ維持。英語思考は Creator が検証不能 = 予測誤差を観測できない。
      > **サピア＝ウォーフ**: 日本語→英語変換で意図の「肌理」が失われるリスク。

      **全層で日本語がデフォルト**:

