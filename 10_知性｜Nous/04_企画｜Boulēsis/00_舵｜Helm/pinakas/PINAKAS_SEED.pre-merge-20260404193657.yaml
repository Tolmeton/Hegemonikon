- id: S-009
  text: >-
    Gemma 4 31B Dense を FiO 忘却研究の次の被験体に。(1) θ_b プロファイリング:
    ハイブリッドアテンション (sliding-window + global 交互) の忘却場パターンは
    従来の均一アテンション (Mistral-7B, Qwen2-1.5B) で見えなかった構造を露出させる
    可能性。(2) P3 hidden state 解析: 31B の深い層構造で忘却曲率 F(l) の解像度が
    飛躍的に向上。(3) Gemini 系列との理論的連続性: API 介入実験 → 重みレベル解析
    を同一家系で接続。A100 (80GB) で BF16 動作可能。Apache 2.0。2026-04-02 リリース。
