<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: warm almost-white -->
    <radialGradient id="bgRadial" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#FDFCFA"/>
      <stop offset="100%" stop-color="#FAF9F6"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgRadial)"/>

  <!-- Radiating morphisms from equilibrium center (very subtle) -->
  <g stroke="#D4CEC6" stroke-width="0.75" stroke-linecap="round" opacity="0.4">
    <line x1="256" y1="256" x2="256" y2="120"/>
    <line x1="256" y1="256" x2="256" y2="392"/>
    <line x1="256" y1="256" x2="120" y2="256"/>
    <line x1="256" y1="256" x2="392" y2="256"/>
    <line x1="256" y1="256" x2="160" y2="160"/>
    <line x1="256" y1="256" x2="352" y2="160"/>
    <line x1="256" y1="256" x2="160" y2="352"/>
    <line x1="256" y1="256" x2="352" y2="352"/>
  </g>

  <!-- ============================================ -->
  <!-- LEFT VORTEX — F (Diverge / Explore)          -->
  <!-- Counterclockwise spiral, solid line           -->
  <!-- Inspired by A-1 galaxy arm + A-4 vortex       -->
  <!-- ============================================ -->

  <!-- F spiral arm: starts near center-left, unfurls counterclockwise outward -->
  <path d="M 220 256
           C 220 236, 200 218, 180 220
           C 155 224, 138 252, 140 274
           C 142 302, 162 330, 190 338
           C 218 346, 246 326, 250 300
           C 255 268, 240 238, 218 224
           C 192 207, 158 228, 148 256
           C 136 290, 150 332, 178 352
           C 210 374, 252 368, 270 340"
        fill="none" stroke="#4A4540" stroke-width="3.5" stroke-linecap="round"/>

  <!-- F inner spiral tightening toward vortex center -->
  <path d="M 220 256
           C 220 248, 214 242, 208 244
           C 200 246, 198 254, 200 260
           C 203 268, 212 270, 218 266
           C 226 261, 224 252, 220 250"
        fill="none" stroke="#4A4540" stroke-width="2.5" stroke-linecap="round"/>

  <!-- F vortex eye -->
  <circle cx="212" cy="256" r="3.5" fill="#4A4540"/>

  <!-- ============================================ -->
  <!-- RIGHT VORTEX — G (Converge / Exploit)        -->
  <!-- Clockwise spiral, dashed line                 -->
  <!-- Mirror structure to F                         -->
  <!-- ============================================ -->

  <!-- G spiral arm: starts near center-right, unfurls clockwise outward -->
  <path d="M 292 256
           C 292 276, 312 294, 332 292
           C 357 288, 374 260, 372 238
           C 370 210, 350 182, 322 174
           C 294 166, 266 186, 262 212
           C 257 244, 272 274, 294 288
           C 320 305, 354 284, 364 256
           C 376 222, 362 180, 334 160
           C 302 138, 260 144, 242 172"
        fill="none" stroke="#6B635B" stroke-width="3" stroke-linecap="round"
        stroke-dasharray="10 5"/>

  <!-- G inner spiral tightening toward vortex center -->
  <path d="M 292 256
           C 292 264, 298 270, 304 268
           C 312 266, 314 258, 312 252
           C 309 244, 300 242, 294 246
           C 286 251, 288 260, 292 262"
        fill="none" stroke="#6B635B" stroke-width="2" stroke-linecap="round"
        stroke-dasharray="6 4"/>

  <!-- G vortex eye -->
  <circle cx="300" cy="256" r="3" fill="#6B635B"/>

  <!-- ============================================ -->
  <!-- EQUILIBRIUM — Fix(G∘F)                       -->
  <!-- The point between the two vortices            -->
  <!-- ============================================ -->

  <!-- Connecting arc between vortices (subtle tension) -->
  <path d="M 225 248 C 240 240, 272 240, 287 248"
        fill="none" stroke="#B8B0A6" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <path d="M 225 264 C 240 272, 272 272, 287 264"
        fill="none" stroke="#B8B0A6" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

  <!-- Fix point — the equilibrium dot -->
  <circle cx="256" cy="256" r="5" fill="#4A4540"/>
  <!-- Fix point halo -->
  <circle cx="256" cy="256" r="10" fill="none" stroke="#6B635B" stroke-width="0.8" opacity="0.5"/>

</svg>
