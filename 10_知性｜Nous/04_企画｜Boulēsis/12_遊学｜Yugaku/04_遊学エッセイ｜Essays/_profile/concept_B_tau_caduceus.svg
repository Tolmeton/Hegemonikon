<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF9F6"/>
      <stop offset="50%" stop-color="#F5F1EC"/>
      <stop offset="100%" stop-color="#EDE8E1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad2)"/>

  <!-- τ backbone -->
  <!-- Horizontal bar -->
  <line x1="160" y1="145" x2="352" y2="145" stroke="#4A4540" stroke-width="4" stroke-linecap="round"/>
  <!-- Vertical stem -->
  <line x1="256" y1="145" x2="256" y2="400" stroke="#4A4540" stroke-width="3.5" stroke-linecap="round"/>

  <!-- F spiral (left side, diverging outward) -->
  <path d="M 256 190
           C 230 190, 210 210, 210 230
           C 210 255, 235 270, 256 260
           C 275 252, 280 230, 256 220"
        fill="none" stroke="#6B635B" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 256 280
           C 220 280, 190 305, 190 330
           C 190 360, 220 378, 256 365
           C 285 355, 295 325, 270 310"
        fill="none" stroke="#6B635B" stroke-width="2.5" stroke-linecap="round"/>

  <!-- G spiral (right side, converging inward) -->
  <path d="M 256 190
           C 282 190, 302 210, 302 230
           C 302 255, 277 270, 256 260
           C 237 252, 232 230, 256 220"
        fill="none" stroke="#8C8378" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 3"/>
  <path d="M 256 280
           C 292 280, 322 305, 322 330
           C 322 360, 292 378, 256 365
           C 227 355, 217 325, 242 310"
        fill="none" stroke="#8C8378" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 3"/>

  <!-- Fix points on the stem -->
  <circle cx="256" cy="240" r="4" fill="#4A4540"/>
  <circle cx="256" cy="340" r="4" fill="#4A4540"/>

  <!-- Arrowhead at stem bottom (downward = grounding) -->
  <polygon points="256,400 250,390 262,390" fill="#4A4540"/>

  <!-- F label (subtle) -->
  <text x="185" y="238" font-family="Georgia, serif" font-size="14" fill="#8C8378" font-style="italic">F</text>
  <!-- G label (subtle) -->
  <text x="310" y="238" font-family="Georgia, serif" font-size="14" fill="#A69D93" font-style="italic">G</text>
</svg>
